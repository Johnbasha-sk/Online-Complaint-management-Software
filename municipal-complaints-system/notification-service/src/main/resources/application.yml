server:
  port: 8084

spring:
  application:
    name: notification-service
  
  datasource:
    url: jdbc:mysql://localhost:3306/municipal_complaints?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:municipal_user}
    password: ${DB_PASSWORD:municipal_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
  
  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:your-email@gmail.com}
    password: ${SMTP_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

jwt:
  secret: ${JWT_SECRET:your-super-secret-jwt-key-for-notification-service}

twilio:
  account:
    sid: ${TWILIO_ACCOUNT_SID:your-twilio-account-sid}
  auth:
    token: ${TWILIO_AUTH_TOKEN:your-twilio-auth-token}
  phone:
    number: ${TWILIO_PHONE_NUMBER:+1234567890}

logging:
  level:
    com.municipal.notification: DEBUG
    org.springframework.security: DEBUG