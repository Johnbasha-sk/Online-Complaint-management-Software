server:
  port: 8083

spring:
  application:
    name: department-service
  datasource:
    url: jdbc:mysql://localhost:3306/municipal_complaints?useSSL=false&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

jwt:
  secret: municipalComplaintSystemSecretKey2024

logging:
  level:
    com.municipal: DEBUG